<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💊 服薬カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 12px;
    background: linear-gradient(135deg, #0a0a0a, #1a0033);
    color: #e0e0e0;
    min-height: 100vh;
  }
  
  h1 {
    text-align: center;
    font-size: 26px;
    margin: 12px 0 6px;
    background: linear-gradient(90deg, #00d4ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .subtitle { 
    text-align: center; 
    color: #aaa; 
    font-size: 14px; 
    margin-bottom: 12px; 
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 16px 0;
    padding: 0 10px;
  }
  
  .controls button {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(0,212,255,0.3);
    padding: 8px 16px;
    border-radius: 9999px;
    font-size: 15px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    background: #111111;
    padding: 10px;
    border-radius: 16px;
    border: 1px solid rgba(0, 212, 255, 0.25);
    margin-bottom: 20px;
  }
  
  .day-header {
    text-align: center;
    padding: 8px 2px;
    font-size: 13px;
    color: #00d4ff;
    font-weight: 500;
  }
  
  .day {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 6px 4px;
    text-align: center;
    min-height: 68px;
    transition: all 0.2s;
  }
  
  .day.today {
    background: #1e3a5f;
    border: 2px solid #00d4ff;
    transform: scale(1.05);
  }
  
  .day-num { 
    font-size: 16px; 
    font-weight: bold; 
    margin-bottom: 4px; 
  }
  
  .stars {
    font-size: 24px;
    display: flex;
    justify-content: center;
    gap: 4px;
    min-height: 28px;
  }
  
  .action-btn {
    width: 100%;
    padding: 16px;
    font-size: 17px;
    border-radius: 9999px;
    margin: 10px 0;
    background: linear-gradient(90deg, #00d4ff, #a855f7);
    color: white;
    border: none;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
  }
</style>
</head>
<body>
<h1>服薬カレンダー</h1>
<p class="subtitle">Grokと美容内服頑張ろうぜ！</p>

<div class="controls">
  <button onclick="prevMonth()">← 前月</button>
  <span id="monthTitle" style="font-size:19px; font-weight:bold;"></span>
  <button onclick="nextMonth()">次月 →</button>
</div>

<div id="calendar" class="calendar"></div>

<button class="action-btn" onclick="markTaken('morning')">🌅 朝 飲んだ！ ★</button>
<button class="action-btn" onclick="markTaken('evening')">🌙 夜 飲んだ！ ★</button>

<script>
let currentDate = new Date();
let records = JSON.parse(localStorage.getItem('medRecords')) || {};

function saveRecords() {
  localStorage.setItem('medRecords', JSON.stringify(records));
}

function getKey(date) {
  return date.toISOString().split('T')[0];
}

// 今日の日付を取得
function getToday() {
  return new Date();
}

function markTaken(time) {
  const today = getToday();
  const key = getKey(today);
  
  if (!records[key]) records[key] = {};
  records[key][time] = true;
  
  saveRecords();
  renderCalendar(); // 再描画（今日が強調される）
}

// カレンダー描画
function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  let html = `
    <div class="day-header">日</div>
    <div class="day-header">月</div>
    <div class="day-header">火</div>
    <div class="day-header">水</div>
    <div class="day-header">木</div>
    <div class="day-header">金</div>
    <div class="day-header">土</div>`;

  // 前月の余白
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="day"></div>`;
  }

  const today = getToday();
  const todayKey = getKey(today);

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const key = getKey(date);
    const dayRecord = records[key] || {};
    
    let starsHTML = '';
    if (dayRecord.morning) starsHTML += '★';
    if (dayRecord.evening) starsHTML += '★';

    const isToday = day === today.getDate() && 
                    month === today.getMonth() && 
                    year === today.getFullYear();

    html += `
      <div class="day ${isToday ? 'today' : ''}">
        <div class="day-num">${day}</div>
        <div class="stars">${starsHTML || '<span style="color:#555;">ー</span>'}</div>
      </div>`;
  }
  
  document.getElementById('calendar').innerHTML = html;
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}

// 初期描画
renderCalendar();
</script>
</body>
</html>
