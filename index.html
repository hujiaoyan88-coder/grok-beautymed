<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💊 Grok 服薬カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root {
    --grok-blue: #00d4ff;
    --grok-purple: #a855f7;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 12px;
    background: linear-gradient(135deg, #0a0a0a, #1a0033);
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  
  h1 {
    font-size: 24px;
    margin: 8px 0 4px;
    text-align: center;
    background: linear-gradient(90deg, var(--grok-blue), var(--grok-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .subtitle { 
    text-align: center; 
    color: #888; 
    font-size: 13px; 
    margin-bottom: 10px; 
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 8px 0;
  }
  
  button {
    padding: 8px 14px;
    font-size: 14px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    background: #111;
    padding: 8px;
    border-radius: 16px;
    border: 1px solid rgba(0, 212, 255, 0.2);
    flex: 1;
    overflow: hidden;
  }
  
  .day-header {
    padding: 6px 2px;
    font-size: 12px;
    font-weight: bold;
    color: var(--grok-blue);
  }
  
  .day {
    padding: 6px 2px;
    min-height: 58px;
    border-radius: 12px;
    font-size: 13px;
  }
  
  .day-num {
    font-size: 16px;
    margin-bottom: 4px;
  }
  
  .stars {
    font-size: 22px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    min-height: 24px;
  }
  
  .action-btn {
    padding: 13px;
    font-size: 15.5px;
    margin: 8px 0 0;
    border-radius: 9999px;
  }
</style>
</head>
<body>
<h1>服薬カレンダー</h1>
<p class="subtitle">Grokと守る あなたの健康スケジュール</p>

<div class="controls">
  <button onclick="prevMonth()">← 前月</button>
  <span id="monthTitle" style="font-size:17px; min-width:110px; text-align:center;"></span>
  <button onclick="nextMonth()">次月 →</button>
</div>

<div id="calendar" class="calendar"></div>

<div>
  <button class="action-btn" onclick="markTaken('morning')">🌅 朝 飲んだ！ ★</button>
  <button class="action-btn" onclick="markTaken('evening')">🌙 夜 飲んだ！ ★</button>
</div>

<script>
let currentDate = new Date();
let records = JSON.parse(localStorage.getItem('medRecords')) || {};

function saveRecords() { localStorage.setItem('medRecords', JSON.stringify(records)); }
function getKey(date) { return date.toISOString().split('T')[0]; }

function markTaken(time) {
  const key = getKey(currentDate);
  if (!records[key]) records[key] = {};
  records[key][time] = true;
  saveRecords();
  renderCalendar();
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  
  let html = `<div class="day-header">日</div><div class="day-header">月</div>
              <div class="day-header">火</div><div class="day-header">水</div>
              <div class="day-header">木</div><div class="day-header">金</div>
              <div class="day-header">土</div>`;

  for (let i = 0; i < firstDay; i++) html += `<div class="day"></div>`;

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const key = getKey(date);
    const dayRecord = records[key] || {};
    
    let starsHTML = '';
    if (dayRecord.morning) starsHTML += '★';
    if (dayRecord.evening) starsHTML += '★';
    
    const isToday = day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
    
    html += `
      <div class="day ${isToday ? 'today' : ''}">
        <div class="day-num">${day}</div>
        <div class="stars">${starsHTML || '<span style="color:#555;">ー</span>'}</div>
      </div>`;
  }
  
  document.getElementById('calendar').innerHTML = html;
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

renderCalendar();
</script>
</body>
</html>
