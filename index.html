<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💊 服薬カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 14px 10px 90px;
    background: linear-gradient(180deg, #0a001f, #1a0033);
    color: #e0e0e0; min-height: 100vh;
  }
  h1 {
    text-align: center; font-size: 26px; margin: 8px 0 4px;
    background: linear-gradient(90deg, #00f0ff, #c026d3);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 18px; }

  .controls {
    display: flex; align-items: center; justify-content: space-between;
    margin: 18px 0; padding: 0 8px;
  }
  .controls button {
    background: rgba(0, 240, 255, 0.1); color: #67e8f9;
    border: 1px solid #67e8f9; padding: 9px 18px; border-radius: 9999px;
    font-size: 15px; font-weight: 600;
  }

  .calendar {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    background: #0f0a1f; padding: 12px; border-radius: 18px;
    border: 1px solid rgba(103, 232, 249, 0.2);
  }
  .day-header { 
    text-align: center; padding: 8px 2px; font-size: 12.5px; 
    color: #67e8f9; font-weight: 600; background: rgba(0,0,0,0.3); border-radius: 8px; 
  }
  
  .day {
    background: #1a1428; border-radius: 14px; 
    padding: 6px 4px;
    text-align: center; 
    aspect-ratio: 1 / 2;
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center;
    min-height: 35px;
    box-sizing: border-box;
  }
  .day.today {
    background: #1e1433 !important; 
    border: 2px solid #67e8f9; 
    box-shadow: 0 0 6px rgba(103, 232, 249, 0.6);
  }
  .day-num { font-size: 16.5px; font-weight: bold; margin-bottom: 4px; }

  .stars {
    font-size: 12px; 
    display: flex; 
    gap: 1.5px; 
    justify-content: center;
    align-items: center;
    width: 100%; 
    height: 14px;
    overflow: hidden;
  }

  .action-area {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    width: 92%; max-width: 380px; display: flex; flex-direction: column; gap: 10px;
  }
  .action-btn {
    padding: 16px; font-size: 16.5px; border-radius: 9999px; border: none;
    font-weight: 700; color: white; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    width: 100%;
  }
  .morning { background: linear-gradient(90deg, #f59e0b, #ec4899); }
  .evening { background: linear-gradient(90deg, #6366f1, #a855f7); }
</style>
</head>
<body>
<h1>服薬カレンダー</h1>
<p class="subtitle">Grokと美容内服頑張ろうぜ！</p>

<div class="controls">
  <button onclick="prevMonth()">← 前月</button>
  <span id="monthTitle" style="font-size:20px; font-weight:700; color:#c4d0ff;"></span>
  <button onclick="nextMonth()">次月 →</button>
</div>

<div id="calendar" class="calendar"></div>

<div class="action-area">
  <button class="action-btn morning" onclick="markTaken('morning')">🌅 朝 飲んだ！ ★</button>
  <button class="action-btn evening" onclick="markTaken('evening')">🌙 夜 飲んだ！ ★</button>
</div>

<script>
let currentDate = new Date();
let records = JSON.parse(localStorage.getItem('medRecords')) || {};

function getKey(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function saveRecords() { localStorage.setItem('medRecords', JSON.stringify(records)); }

function markTaken(time) {
  const today = new Date();
  const key = getKey(today);
  if (!records[key]) records[key] = {};
  records[key][time] = true;
  saveRecords();
  renderCalendar();
  alert(`✅ ${time === 'morning' ? '朝' : '夜'}飲んだな。よくやった雑魚`);
}

function renderCalendar() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${y}年 ${m+1}月`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();

  let html = '';
  ['日','月','火','水','木','金','土'].forEach(h => html += `<div class="day-header">${h}</div>`);

  for (let i = 0; i < firstDay; i++) html += `<div class="day"></div>`;

  const today = new Date();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(y, m, d);
    const key = getKey(dateObj);
    const rec = records[key] || {};
    let stars = (rec.morning ? '★' : '') + (rec.evening ? '★' : '');

    const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();

    html += `<div class="day${isToday ? ' today' : ''}">
      <div class="day-num">${d}</div>
      <div class="stars">${stars || '<span style="color:#444; font-size:22px;">—</span>'}</div>
    </div>`;
  }
  document.getElementById('calendar').innerHTML = html;
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

renderCalendar();
</script>
</body>
</html>
