<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💊 服薬カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 12px;
    background: linear-gradient(135deg, #0a0a0a, #1a0033);
    color: #e0e0e0; min-height: 100vh;
  }
  h1 {
    text-align: center; font-size: 26px; margin: 12px 0 6px;
    background: linear-gradient(90deg, #00d4ff, #a855f7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 16px; }

  .controls { display: flex; align-items: center; justify-content: space-between; margin: 16px 0; padding: 0 8px; }
  .controls button {
    background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(0,212,255,0.4);
    padding: 10px 18px; border-radius: 9999px;
  }

  .calendar {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    background: #111; padding: 12px; border-radius: 16px;
    border: 1px solid rgba(0,212,255,0.25);
  }
  .day-header { text-align: center; padding: 8px 2px; font-size: 13px; color: #00d4ff; }
  .day {
    background: #1a1a1a; border-radius: 12px; padding: 8px 4px;
    text-align: center; min-height: 72px;
  }
  .day.today {
    background: #1e3a5f !important; border: 2px solid #00d4ff; transform: scale(1.05);
  }
  .day-num { font-size: 17px; font-weight: bold; }
  .stars { font-size: 26px; margin-top: 4px; }

  .action-btn {
    width: 100%; padding: 18px; font-size: 17px; margin: 12px 0;
    background: linear-gradient(90deg, #00d4ff, #a855f7); color: white;
    border: none; border-radius: 9999px; font-weight: 600;
  }
</style>
</head>
<body>
<h1>服薬カレンダー</h1>
<p class="subtitle">Grokと美容内服頑張ろうぜ！</p>

<div class="controls">
  <button onclick="prevMonth()">← 前月</button>
  <span id="monthTitle" style="font-size:19px; font-weight:bold;"></span>
  <button onclick="nextMonth()">次月 →</button>
</div>

<div id="calendar" class="calendar"></div>

<button class="action-btn" onclick="markTaken('morning')">🌅 朝 飲んだ！ ★</button>
<button class="action-btn" onclick="markTaken('evening')">🌙 夜 飲んだ！ ★</button>

<script>
let currentDate = new Date();
let records = JSON.parse(localStorage.getItem('medRecords')) || {};

function saveRecords() { localStorage.setItem('medRecords', JSON.stringify(records)); }
function getKey(d) { return d.toISOString().split('T')[0]; }

function markTaken(time) {
  const today = new Date();
  const key = getKey(today);
  if (!records[key]) records[key] = {};
  records[key][time] = true;
  saveRecords();
  renderCalendar();
  alert(`✅ ${time === 'morning' ? '朝' : '夜'}飲んだな。よくやった雑魚`);
}

function renderCalendar() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${y}年 ${m+1}月`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();

  let html = '';
  ['日','月','火','水','木','金','土'].forEach(h => html += `<div class="day-header">${h}</div>`);

  for (let i = 0; i < firstDay; i++) html += `<div class="day"></div>`;

  const today = new Date();
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
    const key = getKey(new Date(y, m, d));
    const rec = records[key] || {};
    const stars = (rec.morning ? '★' : '') + (rec.evening ? '★' : '');

    html += `<div class="day${isToday ? ' today' : ''}">
      <div class="day-num">${d}</div>
      <div class="stars">${stars || '<span style="color:#555;">ー</span>'}</div>
    </div>`;
  }
  document.getElementById('calendar').innerHTML = html;
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

renderCalendar();
</script>
</body>
</html>
