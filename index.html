<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💊 服薬カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 12px;
    background: linear-gradient(135deg, #0a0a0a, #1a0033);
    color: #e0e0e0;
    min-height: 100vh;
  }
  
  h1 {
    text-align: center;
    font-size: 26px;
    margin: 12px 0 6px;
    background: linear-gradient(90deg, #00d4ff, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .subtitle { 
    text-align: center; 
    color: #aaa; 
    font-size: 14px; 
    margin-bottom: 12px; 
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 12px 0;
    padding: 0 8px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    background: #111111;
    padding: 10px;
    border-radius: 16px;
    border: 1px solid rgba(0, 212, 255, 0.25);
  }
  
  .day-header {
    text-align: center;
    padding: 8px 4px;
    font-size: 13px;
    font-weight: bold;
    color: #00d4ff;
    background: rgba(0, 212, 255, 0.1);
    border-radius: 10px;
  }
  
  .day {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 4px;
    text-align: center;
    aspect-ratio: 1 / 1;        /* ← これで正方形に固定 */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 13.5px;
  }
  
  .day-num {
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 2px;
  }
  
  .stars {
    font-size: 24px;
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-top: 2px;
  }
  
  .action-btn {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    border-radius: 9999px;
    margin: 10px 0 0;
    background: linear-gradient(90deg, #00d4ff, #a855f7);
    color: white;
    border: none;
  }
</style>
</head>
<body>
<h1>服薬カレンダー</h1>
<p class="subtitle">Grokと美容内服頑張ろうぜ！</p>

<div class="controls">
  <button onclick="prevMonth()">← 前月</button>
  <span id="monthTitle" style="font-size:19px; font-weight:bold;"></span>
  <button onclick="nextMonth()">次月 →</button>
</div>

<div id="calendar" class="calendar"></div>

<button class="action-btn" onclick="markTaken('morning')">🌅 朝 飲んだ！ ★</button>
<button class="action-btn" onclick="markTaken('evening')">🌙 夜 飲んだ！ ★</button>

<script>
let currentDate = new Date();
let records = JSON.parse(localStorage.getItem('medRecords')) || {};

function saveRecords() { localStorage.setItem('medRecords', JSON.stringify(records)); }
function getKey(date) { return date.toISOString().split('T')[0]; }

function markTaken(time) {
  const key = getKey(currentDate);
  if (!records[key]) records[key] = {};
  records[key][time] = true;
  saveRecords();
  renderCalendar();
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  
  let html = '';
  const headers = ['日','月','火','水','木','金','土'];
  headers.forEach(h => {
    html += `<div class="day-header">${h}</div>`;
  });

  for (let i = 0; i < firstDay; i++) {
    html += `<div class="day"></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const key = getKey(date);
    const dayRecord = records[key] || {};
    
    let starsHTML = '';
    if (dayRecord.morning) starsHTML += '★';
    if (dayRecord.evening) starsHTML += '★';
    
    const isToday = day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
    
    html += `
      <div class="day ${isToday ? 'today' : ''}">
        <div class="day-num">${day}</div>
        <div class="stars">${starsHTML || '<span style="color:#555; font-size:18px;">ー</span>'}</div>
      </div>`;
  }
  
  document.getElementById('calendar').innerHTML = html;
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

renderCalendar();
</style>
</body>
</html>
