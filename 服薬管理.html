
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💊 Grok服薬カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: -apple-system, sans-serif; margin:0; padding:15px; background:#f0f4f8; }
  h1 { text-align:center; color:#2c3e50; }
  .calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin:15px 0; }
  .day { background:white; border-radius:8px; padding:8px; text-align:center; min-height:70px; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
  .header { font-weight:bold; background:#3498db; color:white; }
  .taken { background:#fffacd; }
  .star { color:#f1c40f; font-size:18px; }
  button { padding:10px; margin:5px; border-radius:12px; border:none; background:#3498db; color:white; width:100%; }
  .controls { display:flex; gap:10px; margin:10px 0; }
</style>
</head>
<body>
<h1>💊 服薬カレンダー</h1>

<div class="controls">
  <button onclick="prevMonth()">← 前月</button>
  <span id="monthTitle" style="font-size:18px;font-weight:bold;margin:auto;"></span>
  <button onclick="nextMonth()">次月 →</button>
</div>

<div id="calendar" class="calendar"></div>

<div style="margin-top:20px;">
  <h2>今日の記録</h2>
  <button onclick="markTaken('morning')">🌅 朝 飲んだ！ ☆</button>
  <button onclick="markTaken('evening')">🌙 夜 飲んだ！ ☆</button>
</div>

<script>
let currentDate = new Date();
let records = JSON.parse(localStorage.getItem('medRecords')) || {};

function saveRecords() {
  localStorage.setItem('medRecords', JSON.stringify(records));
}

function getKey(date) {
  return date.toISOString().split('T')[0];
}

function markTaken(time) {
  const key = getKey(currentDate);
  if (!records[key]) records[key] = {};
  records[key][time] = true;
  saveRecords();
  renderCalendar();
  alert(`✅ ${time === 'morning' ? '朝' : '夜'}の服用を記録しました！`);
}

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  
  document.getElementById('monthTitle').textContent = 
    `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  
  let html = `
    <div class="day header">日</div>
    <div class="day header">月</div>
    <div class="day header">火</div>
    <div class="day header">水</div>
    <div class="day header">木</div>
    <div class="day header">金</div>
    <div class="day header">土</div>
  `;

  // 空白
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="day"></div>`;
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const key = getKey(date);
    const dayRecord = records[key] || {};
    
    let stars = '';
    if (dayRecord.morning) stars += '<span class="star">★</span>';
    if (dayRecord.evening) stars += '<span class="star">★</span>';
    
    const isToday = day === new Date().getDate() && 
                    month === new Date().getMonth() && 
                    year === new Date().getFullYear();
    
    html += `
      <div class="day ${isToday ? 'taken' : ''}">
        <div style="font-weight:bold;">${day}</div>
        <div>${stars || 'ー'}</div>
      </div>`;
  }
  
  document.getElementById('calendar').innerHTML = html;
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}

// 初期表示
renderCalendar();
</script>
</body>
</html>
