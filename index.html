<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💊 服薬カレンダー</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 16px 12px 80px;
    background: linear-gradient(180deg, #0a001f, #1a0033);
    color: #e0e0e0; min-height: 100vh;
  }
  h1 {
    text-align: center; font-size: 28px; margin: 8px 0 4px;
    background: linear-gradient(90deg, #00f0ff, #c026d3);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #aaa; font-size: 13.5px; margin-bottom: 20px; }

  .controls {
    display: flex; align-items: center; justify-content: space-between;
    margin: 20px 0; padding: 0 10px;
  }
  .controls button {
    background: rgba(0, 240, 255, 0.1); color: #67e8f9;
    border: 1px solid #67e8f9; padding: 10px 20px; border-radius: 9999px;
    font-weight: 600;
  }

  .calendar {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
    background: #0f0a1f; padding: 14px; border-radius: 20px;
    border: 1px solid rgba(103, 232, 249, 0.2);
  }
  .day-header {
    text-align: center; padding: 10px 4px; font-size: 13px; 
    color: #67e8f9; font-weight: 600; background: rgba(0,0,0,0.3); border-radius: 10px;
  }
  
  .day {
    background: #1a1428; border-radius: 16px; padding: 10px 6px;
    text-align: center; aspect-ratio: 1 / 1;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    transition: all 0.25s;
  }
  .day.today {
    background: #1e1433 !important; 
    border: 2px solid #67e8f9; 
    box-shadow: 0 0 15px rgba(103, 232, 249, 0.6);
  }
  .day-num { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
  .stars { font-size: 28px; display: flex; gap: 6px; }

  .action-btn {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 420px; padding: 18px; font-size: 17px;
    border-radius: 9999px; border: none; font-weight: 700;
    color: white; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
  }
  .morning { background: linear-gradient(90deg, #f59e0b, #ec4899); }
  .evening { background: linear-gradient(90deg, #6366f1, #a855f7); }
</style>
</head>
<body>
<h1>服薬カレンダー</h1>
<p class="subtitle">Grokと守る あなたの健康スケジュール</p>

<div class="controls">
  <button onclick="prevMonth()">← 前月</button>
  <span id="monthTitle" style="font-size:20px; font-weight:700; color:#c4d0ff;"></span>
  <button onclick="nextMonth()">次月 →</button>
</div>

<div id="calendar" class="calendar"></div>

<button class="action-btn morning" onclick="markTaken('morning')">🌅 朝 飲んだ！ ★</button>
<button class="action-btn evening" style="margin-top:12px;" onclick="markTaken('evening')">🌙 夜 飲んだ！ ★</button>

<script>
let currentDate = new Date();
let records = JSON.parse(localStorage.getItem('medRecords')) || {};

function saveRecords() { localStorage.setItem('medRecords', JSON.stringify(records)); }
function getKey(d) { return d.toISOString().split('T')[0]; }

function markTaken(time) {
  const today = new Date();
  const key = getKey(today);
  if (!records[key]) records[key] = {};
  records[key][time] = true;
  saveRecords();
  renderCalendar();
  alert(`✅ ${time === 'morning' ? '朝' : '夜'}飲んだな。よくやった雑魚`);
}

function renderCalendar() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('monthTitle').textContent = `${y}年 ${m+1}月`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();

  let html = '';
  ['日','月','火','水','木','金','土'].forEach(h => {
    html += `<div class="day-header">${h}</div>`;
  });

  for (let i = 0; i < firstDay; i++) html += `<div class="day"></div>`;

  const today = new Date();
  for (let d = 1; d <= daysInMonth; d++) {
    const key = getKey(new Date(y, m, d));
    const rec = records[key] || {};
    let stars = '';
    if (rec.morning) stars += '★';
    if (rec.evening) stars += '★';

    const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();

    html += `<div class="day${isToday ? ' today' : ''}">
      <div class="day-num">${d}</div>
      <div class="stars">${stars || '<span style="color:#444; font-size:22px;">—</span>'}</div>
    </div>`;
  }
  document.getElementById('calendar').innerHTML = html;
}

function prevMonth() { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }
function nextMonth() { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }

renderCalendar();
</script>
</body>
</html>
